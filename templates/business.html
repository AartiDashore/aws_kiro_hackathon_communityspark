<!--
This is the business page of CommunitySpark UI Interface
Author: Aarti Dashore
Version: 1.0.0
-->
{% extends "base.html" %}
{% block title %}Business Profile — CommunitySpark{% endblock %}

{% block content %}
<div id="loading" class="profile-hero" style="min-height:200px">
  <p style="color:rgba(255,255,255,.45);padding-top:2rem">Loading…</p>
</div>
<div id="profile" style="display:none"></div>

<!-- Post a Deal modal -->
<div id="deal-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:14px;padding:2rem;width:min(460px,92vw);position:relative">
    <button onclick="document.getElementById('deal-modal').style.display='none'"
      style="position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted)">✕</button>
    <h3 style="font-family:var(--font-display);font-size:1.3rem;margin-bottom:1.2rem">Post a Flash Deal</h3>
    <div class="form-group">
      <label>Deal Title *</label>
      <input type="text" id="deal-title" placeholder="e.g. Lunch Special">
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" id="deal-desc" placeholder="Optional extra detail">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
      <div class="form-group">
        <label>Discount % *</label>
        <input type="number" id="deal-pct" min="1" max="99" placeholder="25">
      </div>
      <div class="form-group">
        <label>Original Price ($)</label>
        <input type="number" id="deal-price" min="0" step="0.01" placeholder="18.00">
      </div>
    </div>
    <div class="form-group">
      <label>Expires in (hours) *</label>
      <input type="number" id="deal-hours" min="0.5" step="0.5" value="24">
    </div>
    <button class="btn btn--primary btn--full" onclick="submitDeal()">Post Deal</button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<div id="biz-data" data-id="{{ business_id }}" style="display:none"></div>
<script>
const BIZ_ID = parseInt(document.getElementById('biz-data').dataset.id, 10);
let selectedRating = 0;

async function loadProfile() {
  const res  = await fetch(`/api/businesses/${BIZ_ID}`);
  const json = await res.json();
  if (!res.ok) {
    document.getElementById('loading').innerHTML = '<p style="color:rgba(255,255,255,.5);padding-top:2rem">Business not found.</p>';
    return;
  }
  const b = json.data;
  document.title = `${b.name} — CommunitySpark`;

  const avgRating = b.reviews?.length
    ? (b.reviews.reduce((s,r) => s+r.rating, 0) / b.reviews.length).toFixed(1) : null;
  const activeDeals = (b.deals||[]).filter(d => d.is_active && new Date(d.expires_at+'Z') > new Date());

  document.getElementById('loading').style.display = 'none';
  const prof = document.getElementById('profile');
  prof.style.display = 'block';
  prof.innerHTML = `
    <div class="profile-hero">
      <a href="/" class="profile-hero__back">← Back to Discover</a>
      <div class="profile-hero__cat">${escHtml(b.category)}</div>
      <h1 class="profile-hero__name">${escHtml(b.name)}</h1>
      <div class="profile-hero__meta">
        <span>📍 ${escHtml(b.address)}</span>
        ${b.phone ? `<span>📞 ${escHtml(b.phone)}</span>` : ''}
        ${b.website ? `<span>🌐 <a href="${escHtml(b.website)}" target="_blank" rel="noopener" style="color:var(--accent)">${escHtml(b.website.replace(/^https?:\/\//,''))}</a></span>` : ''}
        ${avgRating ? `<span>⭐ ${avgRating} (${b.reviews.length} review${b.reviews.length!==1?'s':''})</span>` : ''}
      </div>
    </div>

    <div class="profile-body">
      <div>
        ${b.story ? `
          <div style="margin-bottom:2rem">
            <div class="profile-label">Our Story</div>
            <p class="profile-story">${escHtml(b.story)}</p>
          </div>` : ''}
        ${b.description ? `
          <div style="margin-bottom:2rem">
            <div class="profile-label">About</div>
            <p class="profile-story">${escHtml(b.description)}</p>
          </div>` : ''}

        <div>
          <div class="profile-label" style="margin-bottom:1rem">Reviews (${b.reviews?.length||0})</div>
          <div id="review-list">
            ${!(b.reviews?.length) ? '<p style="color:var(--muted);font-size:.9rem">No reviews yet. Be the first!</p>'
              : b.reviews.map(r => `
                <div class="review-item">
                  <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
                  ${r.comment ? `<p class="review-comment">${escHtml(r.comment)}</p>` : ''}
                  <span class="review-date">${new Date(r.created_at).toLocaleDateString()}</span>
                </div>`).join('')
            }
          </div>

          <div style="margin-top:1.5rem;padding:1.3rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md)">
            <p style="font-size:.85rem;font-weight:600;margin-bottom:.7rem">Leave a Review</p>
            <div class="stars-input" id="stars">
              ${[1,2,3,4,5].map(i=>`<button class="star-btn" onclick="setStar(${i})">☆</button>`).join('')}
            </div>
            <div class="form-group">
              <textarea id="rev-comment" placeholder="Share your experience…" rows="3"
                style="width:100%;padding:.7rem 1rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--font-body);font-size:.9rem;resize:vertical;outline:none;background:var(--bg)"></textarea>
            </div>
            <button class="btn btn--primary" onclick="submitReview()">Submit Review</button>
          </div>
        </div>
      </div>

      <div>
        <div class="profile-card">
          <h3>Contact &amp; Info</h3>
          ${b.phone ? `<div class="profile-info-row"><strong>Phone</strong>${escHtml(b.phone)}</div>` : ''}
          ${b.website ? `<div class="profile-info-row"><strong>Website</strong><a href="${escHtml(b.website)}" target="_blank">${escHtml(b.website.replace(/^https?:\/\//,''))}</a></div>` : ''}
          <div class="profile-info-row"><strong>Address</strong>${escHtml(b.address)}</div>
        </div>

        <div class="profile-card">
          <h3 style="display:flex;align-items:center;justify-content:space-between">
            🔥 Deals
            <button class="btn btn--secondary" style="font-size:.78rem;padding:.3rem .7rem"
              onclick="document.getElementById('deal-modal').style.display='flex'">+ Post Deal</button>
          </h3>
          ${activeDeals.length ? activeDeals.map(d => `
            <div class="deal-inline">
              <div class="deal-inline__pct">${d.discount_percent}% OFF</div>
              <div class="deal-inline__title">${escHtml(d.title)}</div>
              ${d.description ? `<div style="font-size:.8rem;color:var(--muted);margin-top:.2rem">${escHtml(d.description)}</div>` : ''}
              <div class="deal-inline__timer" id="di-${d.id}">⏱ …</div>
            </div>`).join('')
            : '<p style="color:var(--muted);font-size:.88rem">No active deals. Post one above!</p>'}
        </div>
      </div>
    </div>`;

  activeDeals.forEach(d => startCountdown(`di-${d.id}`, d.expires_at));
}

function setStar(val) {
  selectedRating = val;
  document.querySelectorAll('.star-btn').forEach((btn, i) => {
    btn.textContent = i < val ? '★' : '☆';
    btn.classList.toggle('lit', i < val);
  });
}

async function submitReview() {
  if (!selectedRating) { showToast('Please select a star rating.', 'error'); return; }
  const comment = document.getElementById('rev-comment').value.trim();
  const res = await fetch('/api/reviews', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({business_id: BIZ_ID, rating: selectedRating, comment: comment||null})
  });
  if (res.ok) {
    showToast('✅ Review submitted! Thanks for supporting local.', 'success');
    document.getElementById('rev-comment').value = '';
    setStar(0);
    setTimeout(loadProfile, 800);
  } else {
    showToast('Failed to submit. Try again.', 'error');
  }
}

async function submitDeal() {
  const title = document.getElementById('deal-title').value.trim();
  const pct   = parseInt(document.getElementById('deal-pct').value);
  const hours = parseFloat(document.getElementById('deal-hours').value);
  if (!title || !pct || !hours) { showToast('Title, discount %, and hours are required.', 'error'); return; }

  const res = await fetch('/api/deals', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      business_id: BIZ_ID, title,
      description: document.getElementById('deal-desc').value.trim() || null,
      discount_percent: pct,
      original_price: parseFloat(document.getElementById('deal-price').value)||null,
      expires_in_hours: hours
    })
  });
  if (res.ok) {
    document.getElementById('deal-modal').style.display = 'none';
    showToast('🔥 Deal posted! It\'s live now.', 'success');
    setTimeout(loadProfile, 800);
  } else {
    showToast('Failed to post deal.', 'error');
  }
}

loadProfile();
</script>
{% endblock %}
